global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alerting rules ────────────────────────────────────────────────────────────
# alerts.yml is mounted via docker-compose volume (see docker-compose.yml)
# To route these alerts to Slack/email, add an Alertmanager service and
# configure alerting: section below pointing to it.
rule_files:
  - /etc/prometheus/alerts.yml


scrape_configs:
  # ──────────────────────────── Self-monitoring ─────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Remote AWS Services (via CloudFront) ──────────────────────────────────
  - job_name: "product-service"
    metrics_path: "/metrics/product"
    scheme: "https"
    authorization:
      type: "Bearer"
      credentials: "super-secret-metrics-token-12345"
    static_configs:
      - targets: ["dw7pv6mehop5x.cloudfront.net"]

  - job_name: "inventory-service"
    metrics_path: "/metrics/inventory"
    scheme: "https"
    authorization:
      type: "Bearer"
      credentials: "super-secret-metrics-token-12345"
    static_configs:
      - targets: ["dw7pv6mehop5x.cloudfront.net"]

  - job_name: "checkout-service"
    metrics_path: "/metrics/checkout"
    scheme: "https"
    authorization:
      type: "Bearer"
      credentials: "super-secret-metrics-token-12345"
    static_configs:
      - targets: ["dw7pv6mehop5x.cloudfront.net"]

  - job_name: "payment-service"
    metrics_path: "/metrics/payment"
    scheme: "https"
    authorization:
      type: "Bearer"
      credentials: "super-secret-metrics-token-12345"
    static_configs:
      - targets: ["dw7pv6mehop5x.cloudfront.net"]

  - job_name: "order-service"
    metrics_path: "/metrics/orders"
    scheme: "https"
    authorization:
      type: "Bearer"
      credentials: "super-secret-metrics-token-12345"
    static_configs:
      - targets: ["dw7pv6mehop5x.cloudfront.net"]

  - job_name: 'worker-service'
    static_configs:
      - targets: ['worker-service:4006']
    metrics_path: /metrics
