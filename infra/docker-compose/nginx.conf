user  nginx;
worker_processes  auto;   # use all available CPU cores

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;  # up from 512
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $request_method $request_uri $status';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Rate limiting ──────────────────────────────────────────────────────
    # Shared memory zone: 10m holds ~160k IP addresses
    # Checkout is capped at 20 req/s per IP — a genuine user browser never
    # exceeds this; a flash-sale bot or a retry storm will be throttled.
    limit_req_zone $binary_remote_addr zone=checkout_limit:10m rate=20r/s;
    limit_req_status 429;

    # ── Upstream service pools ─────────────────────────────────────────────
    upstream frontend        { server frontend:3000; }
    upstream product         { server product-service:4001; }
    upstream inventory       { server inventory-service:4002; }
    upstream checkout        { server checkout-service:4003; }
    upstream payment         { server payment-service:4004; }
    upstream orders          { server order-service:4005; }

    # ── Main server block ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint (used by Terraform / CI to verify the box is up)
        location /health {
            access_log off;
            return 200 'OK\n';
            add_header Content-Type text/plain;
        }

        # ── API routing ────────────────────────────────────────────────────
        location /api/products {
            proxy_pass         http://product;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/inventory {
            proxy_pass         http://inventory;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/checkout {
            limit_req zone=checkout_limit burst=30 nodelay;
            proxy_pass         http://checkout;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;   # checkout involves multiple downstream calls
        }

        location /api/payments {
            proxy_pass         http://payment;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/orders {
            proxy_pass         http://orders;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Secure Metrics Endpoints ─────────────────────────────────────────
        location /metrics/product {
            proxy_pass         http://product/metrics;
        }

        location /metrics/inventory {
            proxy_pass         http://inventory/metrics;
        }

        location /metrics/checkout {
            proxy_pass         http://checkout/metrics;
        }

        location /metrics/payment {
            proxy_pass         http://payment/metrics;
        }

        location /metrics/orders {
            proxy_pass         http://orders/metrics;
        }

        # ── Frontend (catch-all) ───────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            # Support Next.js streaming / SSE
            proxy_buffering    off;
            proxy_cache        off;
        }
    }
}
