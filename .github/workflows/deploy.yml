name: Build & Deploy to EC2

on:
  push:
    branches: [master]

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_OWNER: ${{ github.repository_owner }}

jobs:
  # ── Job 1: Build all Docker images in parallel & push to GHCR ─────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: product-service
            context: .
            dockerfile: services/product-service/Dockerfile
          - service: inventory-service
            context: .
            dockerfile: services/inventory-service/Dockerfile
          - service: checkout-service
            context: .
            dockerfile: services/checkout-service/Dockerfile
          - service: payment-service
            context: .
            dockerfile: services/payment-service/Dockerfile
          - service: order-service
            context: .
            dockerfile: services/order-service/Dockerfile
          - service: worker-service
            context: .
            dockerfile: services/worker-service/Dockerfile
          - service: frontend
            context: .
            dockerfile: frontend/Dockerfile
            build_args: |
              NEXT_PUBLIC_PRODUCT_SERVICE_URL=""
              NEXT_PUBLIC_CHECKOUT_SERVICE_URL=""
              NEXT_PUBLIC_ORDER_SERVICE_URL=""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args || '' }}
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/flashforge/${{ matrix.service }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/flashforge/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

  # ── Job 2: Deploy to EC2 after all images are built ─────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix permissions before copy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/flashforge
            sudo chown -R ec2-user:ec2-user /opt/flashforge

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/docker-compose/docker-compose.prod.yml,infra/docker-compose/nginx.conf"
          target: "/opt/flashforge/"
          strip_components: 2   # copies files directly into /opt/flashforge/

      - name: Pull images & restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/flashforge

            # Build .env — use printf so all content stays indented within YAML
            export AWS_DEFAULT_REGION=ap-south-1
            printf 'GHCR_OWNER=gulmaan87\nIMAGE_TAG=latest\n' > .env
            echo "DATABASE_URL_PRODUCT=$(aws ssm get-parameter --name /flashforge/DATABASE_URL_PRODUCT --with-decryption --query Parameter.Value --output text)" >> .env
            echo "DATABASE_URL_INVENTORY=$(aws ssm get-parameter --name /flashforge/DATABASE_URL_INVENTORY --with-decryption --query Parameter.Value --output text)" >> .env
            echo "DATABASE_URL_ORDER=$(aws ssm get-parameter --name /flashforge/DATABASE_URL_ORDER --with-decryption --query Parameter.Value --output text)" >> .env
            echo "DATABASE_URL_CHECKOUT=$(aws ssm get-parameter --name /flashforge/DATABASE_URL_CHECKOUT --with-decryption --query Parameter.Value --output text)" >> .env
            echo "DATABASE_URL_PAYMENT=$(aws ssm get-parameter --name /flashforge/DATABASE_URL_PAYMENT --with-decryption --query Parameter.Value --output text)" >> .env
            echo "REDIS_URL=$(aws ssm get-parameter --name /flashforge/REDIS_URL --with-decryption --query Parameter.Value --output text)" >> .env
            echo "RABBITMQ_URL=$(aws ssm get-parameter --name /flashforge/RABBITMQ_URL --with-decryption --query Parameter.Value --output text)" >> .env

            # Log in to GHCR using a dedicated PAT (expression evaluated by Actions runner before SSH)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull latest images
            docker compose --env-file .env -f docker-compose.prod.yml pull

            # Recreate changed containers
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up dangling images
            docker image prune -f

            echo "=== Deploy finished. Running containers: ==="
            docker compose --env-file .env -f docker-compose.prod.yml ps

            echo "=== Waiting 15s for containers to stabilise ==="
            sleep 15

            echo "=== Logs: frontend ==="
            docker logs flashforge-frontend-1 --tail=40 2>&1 || true
            echo "=== Logs: checkout-service ==="
            docker logs flashforge-checkout-service-1 --tail=40 2>&1 || true
            echo "=== Logs: inventory-service ==="
            docker logs flashforge-inventory-service-1 --tail=40 2>&1 || true
            echo "=== Logs: payment-service ==="
            docker logs flashforge-payment-service-1 --tail=40 2>&1 || true
            echo "=== Logs: product-service ==="
            docker logs flashforge-product-service-1 --tail=40 2>&1 || true
            echo "=== Logs: order-service ==="
            docker logs flashforge-order-service-1 --tail=40 2>&1 || true
            echo "=== Logs: nginx ==="
            docker logs flashforge-nginx-1 --tail=40 2>&1 || true

      - name: Smoke test
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 10 http://${{ secrets.EC2_HOST }}/ || echo "Smoke test skipped - services may still be starting"
          echo "Deploy complete ✅"
